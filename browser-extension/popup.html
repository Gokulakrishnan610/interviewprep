<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Beyond Presence Extractor</title>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    
    h1 {
      font-size: 18px;
      margin: 0 0 15px 0;
      color: #333;
    }
    
    .status {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
    }
    
    .status.active {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .status.inactive {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .info {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 15px;
    }
    
    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 10px;
    }
    
    button:hover {
      background: #45a049;
    }
    
    button.secondary {
      background: #2196F3;
    }
    
    button.secondary:hover {
      background: #0b7dda;
    }
    
    .stats {
      font-size: 12px;
      color: #666;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 6px;
      margin-top: 10px;
    }
    
    .stats div {
      margin: 5px 0;
    }
    
    .emoji {
      font-size: 24px;
      text-align: center;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="emoji">💬</div>
  <h1>Conversation Extractor</h1>
  
  <div id="status" class="status inactive">
    Status: Checking...
  </div>
  
  <div class="info">
    This extension automatically extracts conversation data from Beyond Presence interviews.
  </div>
  
  <button id="extractBtn">Extract Now</button>
  <button id="clearBtn" class="secondary">Clear Data</button>
  
  <div class="stats" id="stats">
    <div>Messages captured: <span id="messageCount">0</span></div>
    <div>Last update: <span id="lastUpdate">Never</span></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
